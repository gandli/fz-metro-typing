<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img" aria-label="FUZHOU METRO TYPING hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ea"/>
      <stop offset="1" stop-color="#ece4d4"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e60039"/>
      <stop offset="0.2" stop-color="#00a651"/>
      <stop offset="0.4" stop-color="#f39800"/>
      <stop offset="0.6" stop-color="#8e4c9e"/>
      <stop offset="0.8" stop-color="#00b1cc"/>
      <stop offset="1" stop-color="#005baa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg)"/>
  <!-- 线路 motif: 横贯的福州地铁 6 色路径 -->
  <path d="M80 300 C 260 180, 420 420, 600 300 S 940 180, 1120 300"
        fill="none" stroke="url(#route)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <!-- 站点徽章 -->
  <g>
    <circle cx="80" cy="300" r="14" fill="#fff" stroke="#e60039" stroke-width="6"/>
    <circle cx="330" cy="270" r="11" fill="#fff" stroke="#00a651" stroke-width="5"/>
    <circle cx="600" cy="300" r="13" fill="#fff" stroke="#f39800" stroke-width="6"/>
    <circle cx="860" cy="240" r="11" fill="#fff" stroke="#00b1cc" stroke-width="5"/>
    <circle cx="1120" cy="300" r="14" fill="#fff" stroke="#005baa" stroke-width="6"/>
  </g>
  <!-- 打字游标 -->
  <g transform="translate(520 110)">
    <rect x="0" y="0" width="200" height="64" rx="10" fill="#16130c"/>
    <text x="22" y="42" font-family="'DM Mono', monospace" font-size="30" fill="#f5f1e8">dong jie kou</text>
    <rect x="186" y="10" width="3" height="44" fill="#e60039">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- 标题 -->
  <text x="520" y="220" font-family="'Noto Sans SC', sans-serif" font-weight="900" font-size="58" fill="#16130c" text-anchor="middle">FUZHOU METRO TYPING</text>
  <text x="520" y="262" font-family="'Noto Sans SC', sans-serif" font-weight="500" font-size="22" fill="#5b5340" text-anchor="middle">福州地铁真实站名 · 英文 / 简体 / 拼音 三语打字</text>
</svg>
